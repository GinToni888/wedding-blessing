<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maggie & Stanley 婚禮座位導引</title>
    <style>
        :root {
            --cream: #FFFDD0;
            --forest-green: #2F4F4F;
            --accent: #D4AF37;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--cream);
            color: var(--forest-green);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { margin-bottom: 30px; }
        input {
            width: 80%;
            padding: 12px;
            border: 2px solid var(--forest-green);
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            background: white;
            display: none; /* 預設隱藏 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .loading { margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Wedding Map</h1>
    <p>請輸入您的姓名以查看座位</p>
    <input type="text" id="nameInput" placeholder="例如：張小明" oninput="searchGuest()">
    
    <div id="loading" class="loading">搜尋中...</div>
    
    <div id="result">
        <h2 id="guestGreeting"></h2>
        <p style="font-size: 1.2em;">您的座位在：<strong id="tableName" style="color: var(--accent);"></strong></p>
        <p id="dietaryNote" style="color: #888; font-style: italic;"></p>
        <hr>
        <p>🗺️ 2.5D 沈浸式地圖即將載入...</p>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwoDSBdb48ORAXDT9liPSY9aAJFxcFtEHF4ObzHcxHRrzwYjeIowpe0YDTv1lqUGzH9/exec";
    let guestData = [];

    // 網頁開啟時先抓取資料
    async function fetchData() {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(API_URL);
            guestData = await response.json();
            document.getElementById('loading').style.display = 'none';
        } catch (error) {
            console.error("抓取資料失敗:", error);
        }
    }

    function searchGuest() {
        const input = document.getElementById('nameInput').value.trim();
        const resultDiv = document.getElementById('result');
        
        if (input.length < 2) {
            resultDiv.style.display = 'none';
            return;
        }

        const guest = guestData.find(g => g.Name === input);

        if (guest) {
            resultDiv.style.display = 'block';
            document.getElementById('guestGreeting').innerText = `嗨 ${guest.Name} !`;
            document.getElementById('tableName').innerText = guest.DisplayName || `第 ${guest.TableID} 桌`;
            document.getElementById('dietaryNote').innerText = guest.Dietary ? `備註：${guest.Dietary}` : "";
        } else {
            resultDiv.style.display = 'none';
        }
    }

    window.onload = fetchData;
</script>

</body>
</html>
