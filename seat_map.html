<style>
    #map-container {
        width: 100%;
        max-width: 800px;
        height: 500px;
        background: #f9f6f2; /* 奶油底色 */
        margin-top: 20px;
        border: 1px solid var(--forest-green);
        position: relative;
        overflow: hidden;
    }
    .table-marker {
        position: absolute;
        width: 40px;
        height: 40px;
        background: white;
        border: 2px solid var(--forest-green);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        transition: all 0.5s ease;
        transform: rotateX(45deg) rotateZ(-45deg); /* 2.5D 傾斜感 */
    }
    .highlight {
        background: var(--accent) !important;
        color: white;
        transform: scale(1.5) rotateX(45deg) rotateZ(-45deg) !important;
        box-shadow: 0 0 20px var(--accent);
    }
    /* 紅地毯路徑線 */
    #path-line {
        position: absolute;
        stroke: #d43f3a;
        stroke-width: 4;
        fill: none;
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
    }
</style>

<div id="map-container">
    <svg id="svg-map" width="100%" height="100%" viewBox="0 0 800 500">
        </svg>
</div>
