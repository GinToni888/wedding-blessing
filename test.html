<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Maggie & Stanley Wedding Wall - Premium Illustration</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@0,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --cream-bg: #fdfaf5; --sage-green: #7d8c78; --gold: #c5a059; --text-color: #4a4a4a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background-color: var(--cream-bg); 
            font-family: "Playfair Display", "STFangsong", "華康儷中宋", serif; 
        }

        #bg-sharp { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('wedding-bg.png') no-repeat center center; background-size: cover; z-index: 1; }
        #bg-blurred { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('wedding-bg.png') no-repeat center center; background-size: cover; z-index: 2; filter: blur(25px); transform: scale(1.1); transition: opacity 5s ease-in-out; }
        .is-clear { opacity: 0; }

        /* 📍 虛擬畫布：保證飯店投影比例與筆電一致 */
        #stage {
            position: absolute; width: 1920px; height: 1080px;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            transform-origin: center center;
            display: flex; align-items: center; justify-content: center; z-index: 500;
        }

       /* ✨ ✨ ✨ 📍 改用「百分比」控制婚紗照樣式 */
        .couple-illustration {
            position: absolute;
            /* 📍 位置：使用百分比座標 (相對於 1920x1080) */
            bottom: -60%;  /* 稍微出鏡，增加構圖張力 */
            left: -3%;    
            
            /* 📍 大小：直接決定佔畫面的寬度比例 */
            width: 38%;   /* 這是妳要的 1.5 倍體感寬度 (約 1575px) */
            height: auto;
            
            z-index: 600; /* 確保在最前端 */
            filter: drop-shadow(0 25px 50px rgba(0,0,0,0.15));
            pointer-events: none; 
            will-change: transform;
        }

        #butterfly-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
        .butterfly { position: absolute; width: 60px !important; height: auto; will-change: transform; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); opacity: 0; }

        /* ✨ 字卡：1300px / 深層毛玻璃 / 0.6透明 */
        .message-card { 
            position: relative; 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.3); 
            outline: 14px solid rgba(255, 255, 255, 0.2); 
            padding: 90px 130px; 
            width: 1300px; height: auto; min-height: 520px; 
            display: flex; flex-direction: column; justify-content: center;
            text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.04); border-radius: 4px; 
            animation: cardEnter 2.5s forwards; 
            z-index: 400; /* 📍 字卡在似顏繪之下 */
        }

        .message-card.welcome-theme {
            background: rgba(255, 248, 231, 0.65) !important;
            outline-color: rgba(255, 248, 231, 0.3) !important;
        }

        /* 📍 標題 42px / 不加粗 */
        .sender { 
            font-family: "STFangsong", serif !important; 
            font-size: 42px; font-weight: 500; 
            color: var(--sage-green); margin-bottom: 25px; letter-spacing: 0.25em; 
        }
        
        /* 📍 內容 40px / 不加粗 / ✨ 解除硬切，智慧換行 */
        .content { 
            font-family: "STFangsong", serif !important; 
            font-size: 40px; font-weight: 400; line-height: 1.7; 
            color: var(--text-color); margin-bottom: 25px; 
            word-wrap: break-word; overflow-wrap: break-word; white-space: pre-wrap; 
            display: flex; align-items: center; justify-content: center;
            flex-grow: 1; width: 100%;
        }
        
        .content span { width: 100%; display: block; }

        .wedding-tag { font-family: 'Playfair Display', serif !important; font-style: italic; font-size: 20px; color: var(--gold); }
        .page-indicator { font-size: 18px; color: var(--gold); margin-bottom: 15px; opacity: 0.6; font-weight: bold; }

        @keyframes cardEnter { 
            from { opacity: 0; transform: translateY(40px) scale(0.98); filter: blur(15px); } 
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); } 
        }
    </style>
</head>
<body>

    <div id="bg-sharp"></div>
    <div id="bg-blurred"></div>

    <div id="stage">
        <img src="couple-photo2.png" alt="Maggie & Stanley Illustration" class="couple-illustration">
        
        <div id="butterfly-layer"></div>
        <div id="card-container"></div>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycby-P94fg0kooAipQFNCgBejG2EFx0JDT-8gC0A6mlEwISuEyUpyqBJk6XTrAR7FXGcWvQ/exec";
        
        const localMsgs = [
            { name: "Maggie & Stanley", msg: "歡迎來到我們的婚禮！\n Welcome to Stanley and Maggie's Wedding" },
            { name: "Maggie & Stanley", msg: "We are deeply touched by your warm blessings.\n祝大家玩得開心 🥂 Have fun " },
            { name: "Maggie & Stanley", msg: "如果你也想給我們祝福，請按Line選單進入線上留言" }
        ];

        function adjustScale() {
            const stage = document.getElementById('stage');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        window.addEventListener('resize', adjustScale);
        adjustScale();

        let messages = [], currentIndex = 0, currentSubPage = 0, initialLocalPhase = true;

        const bfFiles = ['bf1_L.gif', 'bf2_L.gif', 'bf3_L.gif', 'bf1_R.gif', 'bf2_R.gif'];
        let activeBfs = [];
        function initButterflies() {
            const count = gsap.utils.random(3, 5, 1);
            for (let i = 0; i < count; i++) { setTimeout(() => createButterfly(), i * 3500); }
        }
        function createButterfly() {
            const container = document.getElementById('butterfly-layer');
            const img = document.createElement('img'); img.className = 'butterfly';
            let unused = bfFiles.filter(f => !activeBfs.includes(f));
            let file = unused.length > 0 ? unused[Math.floor(Math.random() * unused.length)] : bfFiles[Math.floor(Math.random() * bfFiles.length)];
            activeBfs.push(file); img.src = file; container.appendChild(img);
            let nativeDir = file.includes('_L') ? -1 : 1;
            animateButterfly(img, nativeDir);
        }
        function animateButterfly(el, nativeDir) {
            let currentDir = nativeDir; let baseScale = gsap.utils.random(0.7, 0.9); 
            let startX = currentDir === 1 ? -150 : 1920 + 150;
            let startY = gsap.utils.random(150, 1080 - 250);
            gsap.set(el, { x: startX, y: startY, scaleX: (currentDir === nativeDir ? baseScale : -baseScale), scaleY: baseScale, opacity: 0 });
            gsap.to(el, { opacity: 1, duration: 2 });
            function fly() {
                let targetX = currentDir === 1 ? 1920 - 150 : 150;
                let duration = gsap.utils.random(18, 26);
                gsap.to(el, {
                    x: targetX, y: `+=${gsap.utils.random(-150, 150)}`, duration: duration, ease: "sine.inOut",
                    onUpdate: () => {
                        let curX = gsap.getProperty(el, "x");
                        let inTreeZone = curX > 1920 * 0.83;
                        let treeScale = inTreeZone ? baseScale * 0.7 : baseScale;
                        let flip = (currentDir === nativeDir) ? treeScale : -treeScale;
                        gsap.to(el, { scaleX: flip, scaleY: treeScale, duration: 1.2, overwrite: 'auto' });
                    },
                    onComplete: turnAround
                });
            }
            function turnAround() { currentDir *= -1; let flipTarget = (currentDir === nativeDir) ? baseScale : -baseScale; gsap.to(el, { scaleX: flipTarget, duration: 0.8, onComplete: fly }); }
            fly();
        }

        // --- ✉️ 文字處理器：✨ 解除 JS 硬切限制 ---
        function processText(text) {
            if (!text) return [""];
            const rawLines = text.toString().split('\n');
            let pages = [];
            for (let i = 0; i < rawLines.length; i += 5) {
                pages.push(rawLines.slice(i, i + 5).join('\n'));
            }
            return pages;
        }

        function rotateMessage() {
            const container = document.getElementById('card-container');
            let dataList = (initialLocalPhase || messages.length === 0) ? localMsgs : messages;
            if (currentIndex >= dataList.length) { currentIndex = 0; currentSubPage = 0; }
            const data = dataList[currentIndex];
            if (!data) return;

            const pages = processText(data.displayMsg || data.msg || "");
            const currentPageText = pages[currentSubPage] || "";
            const pageInfo = pages.length > 1 ? `<div class="page-indicator">Part ${currentSubPage + 1} / ${pages.length}</div>` : "";
            const themeClass = initialLocalPhase ? " welcome-theme" : "";

            container.innerHTML = `
                <div class="message-card${themeClass}">
                    <div class="sender">— ${data.displayName || data.name || "賓客"} —</div>
                    ${pageInfo}
                    <div class="content"><span>${currentPageText.toString().replace(/\n/g, '<br>')}</span></div>
                    <div class="wedding-tag">Forever Love @ Mandarin Oriental Taipei</div>
                </div>`;

            if (currentSubPage < pages.length - 1) { currentSubPage++; } else {
                currentSubPage = 0;
                if (initialLocalPhase && currentIndex === localMsgs.length - 1) { 
                    initialLocalPhase = false; currentIndex = 0; 
                } else { 
                    currentIndex = (currentIndex + 1) % dataList.length; 
                }
            }
        }

        async function fetchMessages() {
            try {
                const res = await fetch(`${gasUrl}?t=${Date.now()}`);
                const data = await res.json();
                if (Array.isArray(data) && data.length > 0) {
                    let filtered = data.filter(item => Object.values(item).some(v => v && v.toString().toLowerCase().trim() === 'ok'));
                    const pr = (filtered.length > 0 ? filtered : data).map(item => ({ name: item.賓客姓名 || item.name || "賓客", msg: item.祝福語 || item.msg || "" }));
                    let lc = localMsgs.map(m => ({ displayName: m.name, displayMsg: m.msg }));
                    let mixed = [], lC = 0;
                    pr.forEach((p, i) => { 
                        mixed.push({ displayName: p.name, displayMsg: p.msg }); 
                        if ((i + 1) % 15 === 0) { mixed.push(lc[lC % lc.length]); lC++; } 
                    });
                    if (pr.length > 0 && pr.length % 15 !== 0) mixed.push(lc[lC % lc.length]);
                    if (mixed.length > 0) messages = mixed;
                }
            } catch (e) {}
        }

        window.onload = () => {
            document.getElementById('bg-blurred').classList.add('is-clear');
            adjustScale(); initButterflies();
            rotateMessage(); setInterval(rotateMessage, 12000); 
            fetchMessages(); setInterval(fetchMessages, 60000);
        };
    </script>
</body>
</html>
