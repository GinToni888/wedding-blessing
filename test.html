<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Maggie & Stanley Wedding Wall</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@0,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --cream-bg: #fdfaf5; --sage-green: #7d8c78; --gold: #c5a059; --text-color: #4a4a4a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background-color: var(--cream-bg); font-family: "Playfair Display", "STFangsong", "華康儷中宋", serif; }

        /* 背景層 */
        #bg-sharp { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('wedding-bg.png') no-repeat center center; background-size: cover; z-index: 1; }
        #bg-blurred { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('wedding-bg.png') no-repeat center center; background-size: cover; z-index: 2; filter: blur(25px); transform: scale(1.1); transition: opacity 5s ease-in-out; }
        .is-clear { opacity: 0; }
        
        #butterfly-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
        .butterfly { position: absolute; width: 60px !important; height: auto; will-change: transform; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); opacity: 0; }

        /* 卡片容器 */
        #display-wrapper { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 500; }
        .message-card { 
            position: relative; background: rgba(255, 255, 255, 0.96); border: 1px solid #f0f0f0; 
            outline: 12px solid rgba(255, 255, 255, 0.5); padding: 80px 110px; width: 1050px; 
            min-height: 520px; display: flex; flex-direction: column; justify-content: center;
            text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,0.07); border-radius: 4px; 
            animation: cardEnter 2.5s forwards; 
        }

        /* 📍 在這邊修改字體大小 (px) 與加粗 (weight) */
        .sender { 
            font-family: "STFangsong", serif !important; 
            font-size: 32px;      /* <--- 修改寄件人大小 */
            font-weight: 800;     /* <--- 修改寄件人加粗 (700-900) */
            color: var(--sage-green); margin-bottom: 30px; letter-spacing: 0.25em; 
        }
        
        .content { 
            font-family: "STFangsong", serif !important; 
            font-size: 30px;      /* <--- 修改祝福語大小 */
            font-weight: 600;     /* <--- 修改祝福語加粗 (500-700) */
            line-height: 1.8; color: var(--text-color); margin-bottom: 40px; 
            word-wrap: break-word; white-space: pre-wrap;
            min-height: 280px;    /* 確保 5 行的高度穩定 */
        }

        .wedding-tag { font-family: 'Playfair Display', serif !important; font-style: italic; font-size: 18px; color: var(--gold); }
        .page-indicator { font-size: 14px; color: var(--gold); margin-top: -25px; margin-bottom: 20px; opacity: 0.6; }

        @keyframes cardEnter { 
            from { opacity: 0; transform: translateY(30px) scale(0.98); filter: blur(10px); } 
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); } 
        }
    </style>
</head>
<body>

    <div id="bg-sharp"></div>
    <div id="bg-blurred"></div>
    <div id="butterfly-layer"></div>
    <div id="display-wrapper"><div id="card-container"></div></div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycby-P94fg0kooAipQFNCgBejG2EFx0JDT-8gC0A6mlEwISuEyUpyqBJk6XTrAR7FXGcWvQ/exec";
        
        const localMsgs = [
            { name: "Maggie & Stanley", msg: "歡迎來到我們的婚禮！\n Welcome to Stanley and Maggie's Wedding" },
            { name: "Maggie & Stanley", msg: "感謝你們溫暖的祝福，祝大家玩得開心\n We are deeply touched by your warm blessings.\n Have fun 🥂" }
        ];
        
        let messages = [], currentIndex = 0, currentSubPage = 0, initialLocalPhase = true;

        // --- 🦋 蝴蝶 AI 系統 (保持不變) ---
        const bfFiles = ['bf1_L.gif', 'bf2_L.gif', 'bf3_L.gif', 'bf1_R.gif', 'bf2_R.gif'];
        let activeBfs = [];
        function initButterflies() {
            const count = gsap.utils.random(3, 5, 1);
            for (let i = 0; i < count; i++) { setTimeout(() => createButterfly(), i * 3500); }
        }
        function createButterfly() {
            const container = document.getElementById('butterfly-layer');
            const img = document.createElement('img'); img.className = 'butterfly';
            let unused = bfFiles.filter(f => !activeBfs.includes(f));
            let file = unused.length > 0 ? unused[Math.floor(Math.random() * unused.length)] : bfFiles[Math.floor(Math.random() * bfFiles.length)];
            activeBfs.push(file); img.src = file; container.appendChild(img);
            let nativeDir = file.includes('_L') ? -1 : 1;
            animateButterfly(img, nativeDir);
        }
        function animateButterfly(el, nativeDir) {
            let currentDir = nativeDir; let baseScale = gsap.utils.random(0.7, 0.9); 
            let startX = currentDir === 1 ? -150 : window.innerWidth + 150;
            let startY = gsap.utils.random(150, window.innerHeight - 250);
            gsap.set(el, { x: startX, y: startY, scaleX: (currentDir === nativeDir ? baseScale : -baseScale), scaleY: baseScale, opacity: 0 });
            gsap.to(el, { opacity: 1, duration: 2 });
            function fly() {
                let targetX = currentDir === 1 ? window.innerWidth - 150 : 150;
                let duration = gsap.utils.random(18, 26);
                gsap.to(el, {
                    x: targetX, y: `+=${gsap.utils.random(-150, 150)}`, duration: duration, ease: "sine.inOut",
                    onUpdate: () => {
                        let curX = gsap.getProperty(el, "x");
                        let inTreeZone = curX > window.innerWidth * 0.83;
                        let treeScale = inTreeZone ? baseScale * 0.7 : baseScale;
                        let flip = (currentDir === nativeDir) ? treeScale : -treeScale;
                        gsap.to(el, { scaleX: flip, scaleY: treeScale, duration: 1.2, overwrite: 'auto' });
                    },
                    onComplete: turnAround
                });
            }
            function turnAround() { currentDir *= -1; let flipTarget = (currentDir === nativeDir) ? baseScale : -baseScale; gsap.to(el, { scaleX: flipTarget, duration: 0.8, onComplete: fly }); }
            fly();
        }

        // --- ✉️ 自動分頁輪播系統 ---
        function getPages(text, limit = 5) {
            const lines = text.split('\n');
            let pages = [];
            for (let i = 0; i < lines.length; i += limit) {
                pages.push(lines.slice(i, i + limit).join('\n'));
            }
            return pages;
        }

        function rotateMessage() {
            const container = document.getElementById('card-container');
            const data = initialLocalPhase ? localMsgs[currentIndex] : messages[currentIndex];
            if (!data) return;

            const pages = getPages(data.displayMsg || data.msg, 5);
            const currentPageText = pages[currentSubPage];
            const pageInfo = pages.length > 1 ? `<div class="page-indicator">( 第 ${currentSubPage + 1} / ${pages.length} 頁 )</div>` : "";

            container.innerHTML = `
                <div class="message-card">
                    <div class="sender">— ${data.displayName || data.name} —</div>
                    ${pageInfo}
                    <div class="content">${currentPageText.replace(/\n/g, '<br>')}</div>
                    <div class="wedding-tag">Forever Love 2026.04 @ Mandarin Oriental Taipei</div>
                </div>`;

            // 判斷是否還有下一頁
            if (currentSubPage < pages.length - 1) {
                currentSubPage++; // 下次輪播顯示同一人的下一頁
            } else {
                currentSubPage = 0; // 重置子分頁，準備換下一位賓客
                if (initialLocalPhase && currentIndex === localMsgs.length - 1) { 
                    initialLocalPhase = false; currentIndex = 0; 
                } else { 
                    currentIndex = (currentIndex + 1) % (initialLocalPhase ? localMsgs.length : (messages.length || 1)); 
                }
            }
        }

        async function fetchMessages() {
            try {
                const res = await fetch(`${gasUrl}?t=${Date.now()}`);
                const data = await res.json();
                if (Array.isArray(data) && data.length > 0) {
                    let filtered = data.filter(item => Object.values(item).some(v => v && v.toString().toLowerCase().trim() === 'ok'));
                    const pr = (filtered.length > 0 ? filtered : data).map(item => ({ name: item.賓客姓名 || item.name || "賓客", msg: item.祝福語 || item.msg || "" }));
                    let lc = localMsgs.map(m => ({ displayName: m.name, displayMsg: m.msg })), mixed = [], lC = 0;
                    pr.forEach((p, i) => { 
                        mixed.push({ displayName: p.name, displayMsg: p.msg }); 
                        if ((i + 1) % 15 === 0) { mixed.push(lc[lC % lc.length]); lC++; } 
                    });
                    if (pr.length % 15 !== 0) mixed.push(lc[lC % lc.length]);
                    messages = mixed;
                }
            } catch (e) {}
        }

        window.onload = () => {
            document.getElementById('bg-blurred').classList.add('is-clear');
            initButterflies();
            rotateMessage(); setInterval(rotateMessage, 12000);
            fetchMessages(); setInterval(fetchMessages, 60000);
        };
    </script>
</body>
</html>
